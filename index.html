<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кулинарный помощник</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>🍳 Кулинарный помощник</h1>
        
        <div class="search-box">
            <div class="section">
                <div class="section-title">🥕 Какие продукты у вас есть?</div>
                <textarea id="ingredients" class="ingredients-input" placeholder="курица, рис, овощи..."></textarea>
                <button class="voice-btn" id="voiceBtn">🎤 Голосовой ввод</button>
            </div>
            
            <div class="section">
                <div class="section-title">👤 Для кого готовим?</div>
                <div class="filters-grid">
                    <div class="filter-group">
                        <label>Категория</label>
                        <select id="forWhom">
                            <option value="all">Не важно</option>
                            <option value="family">Для семьи</option>
                            <option value="kids">Для детей</option>
                            <option value="quick">Быстро для себя</option>
                            <option value="guests">Для гостей</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Тип питания</label>
                        <select id="dietType">
                            <option value="all">Любой</option>
                            <option value="meat">Мясоед</option>
                            <option value="vegetarian">Вегетарианское</option>
                            <option value="light">Лёгкое/диетическое</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Кухня мира</label>
                        <select id="cuisine">
                            <option value="all">Любая кухня</option>
                            <option value="russian">Русская/домашняя</option>
                            <option value="italian">Итальянская</option>
                            <option value="asian">Азиатская</option>
                            <option value="universal">Универсальная</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Максимум времени</label>
                        <select id="maxTime">
                            <option value="90">До 1.5 часов</option>
                            <option value="60">До 1 часа</option>
                            <option value="40">До 40 минут</option>
                            <option value="20">До 20 минут</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <div class="section">
                <div class="section-title">⚠️ Исключить (аллергии, не люблю)</div>
                <textarea id="exclude" class="ingredients-input" style="min-height: 60px;" placeholder="Например: грибы, орехи, лук, чеснок..."></textarea>
            </div>
            
            <button class="search-btn" onclick="app.search()">🔍 Найти рецепты</button>
        </div>
        
        <div id="results" class="results"></div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/voice.js"></script>
    <script src="js/recipes.js"></script>
    <script src="js/search.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
